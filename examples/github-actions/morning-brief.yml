name: WorkCue Morning Brief

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - run: pnpm install --frozen-lockfile
      - run: pnpm today --config workcue.config.yml --output briefs/${{ github.run_id }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.WORKCUE_GITHUB_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: workcue-brief
          path: briefs/${{ github.run_id }}.md
